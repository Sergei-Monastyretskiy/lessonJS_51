version: '3.8'

services:
  # Сервіс Express додатка
  app:
    build: .
    container_name: express-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/expressapp
    volumes:
      # Синхронізація коду для автоматичного оновлення під час розробки
      - .:/app
      - /app/node_modules
    depends_on:
      - mongodb
    restart: unless-stopped
    command: npm run dev

  # Сервіс MongoDB
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      # Зберігання даних MongoDB
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
